<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reelcast</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #0f0f0f; color: #e0e0e0; min-height: 100vh; padding: 2rem; }
  h1 { font-size: 1.6rem; font-weight: 600; color: #fff; margin-bottom: 1.5rem; letter-spacing: -0.02em; }
  h1 span { color: #f97316; }
  #search-bar { display: flex; gap: 0.5rem; margin-bottom: 2rem; }
  #q { flex: 1; padding: 0.6rem 1rem; border-radius: 6px; border: 1px solid #333; background: #1a1a1a; color: #e0e0e0; font-size: 1rem; outline: none; }
  #q:focus { border-color: #f97316; }
  button { padding: 0.6rem 1.2rem; border-radius: 6px; border: none; background: #f97316; color: #fff; font-size: 1rem; cursor: pointer; }
  button:hover { background: #ea6a0a; }
  #results { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
  .card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; padding: 1rem; }
  .card h2 { font-size: 1rem; font-weight: 600; margin-bottom: 0.3rem; }
  .meta { font-size: 0.78rem; color: #888; margin-bottom: 0.8rem; }
  .actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }
  .btn-xspf { flex: 1; padding: 0.4rem 0.6rem; text-align: center; border-radius: 5px; background: #f97316; color: #fff; text-decoration: none; font-size: 0.82rem; white-space: nowrap; }
  .btn-copy { flex: 1; padding: 0.4rem 0.6rem; text-align: center; border-radius: 5px; background: #2a2a2a; color: #ccc; border: none; font-size: 0.82rem; cursor: pointer; white-space: nowrap; }
  .btn-xspf:hover { background: #ea6a0a; }
  .btn-copy:hover  { background: #333; color: #fff; }
  .btn-copy.copied { background: #166534; color: #86efac; }
  #status { color: #888; font-size: 0.9rem; margin-bottom: 1rem; }
</style>
</head>
<body>
<h1>Reel<span>cast</span></h1>
<div id="search-bar">
  <input id="q" type="text" placeholder="Search movies…" autofocus>
  <button onclick="doSearch()">Search</button>
</div>
<div id="status"></div>
<div id="results"></div>
<script>
  function fmt_duration(secs) {
    if (!secs) return '';
    const h = Math.floor(secs / 3600);
    const m = Math.floor((secs % 3600) / 60);
    return h > 0 ? `${h}h ${m}m` : `${m}m`;
  }
  function fmt_size(bytes) {
    if (bytes > 1e9) return (bytes / 1e9).toFixed(1) + ' GB';
    return (bytes / 1e6).toFixed(0) + ' MB';
  }
  function copyUrl(btn, url) {
    navigator.clipboard.writeText(url).then(() => {
      btn.textContent = '✓ Copied';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = '⎘ Copy URL'; btn.classList.remove('copied'); }, 2000);
    });
  }
  async function doSearch() {
    const q = document.getElementById('q').value.trim();
    const url = q ? `/search?q=${encodeURIComponent(q)}` : '/search';
    const status = document.getElementById('status');
    status.textContent = 'Searching…';
    const res = await fetch(url);
    const items = await res.json();
    status.textContent = `${items.length} result${items.length !== 1 ? 's' : ''}`;
    document.getElementById('results').innerHTML = items.map(m => `
      <div class="card">
        <h2>${m.title}</h2>
        <div class="meta">
          ${m.year ? m.year + ' · ' : ''}${fmt_duration(m.duration_secs)}${m.resolution ? ' · ' + m.resolution : ''} · ${fmt_size(m.size_bytes)}
        </div>
        <div class="actions">
          <a class="btn-xspf" href="${m.play_url}" download>▶ Open in VLC</a>
          <button class="btn-copy" onclick="copyUrl(this, '${m.file_url}')">⎘ Copy URL</button>
        </div>
      </div>`).join('');
  }
  document.getElementById('q').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
  doSearch();
</script>
</body>
</html>
